    editorField.addEventListener('beforeinput', function(e) {
        if (e.data === ' ') {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            const anchorNode = selection.anchorNode;

            if (anchorNode && anchorNode.nodeType === Node.TEXT_NODE) {
                const text = anchorNode.nodeValue;
                const offset = range.startOffset;
                const textBeforeCursor = text.substring(0, offset);

                let nodeCheck = anchorNode;
                let insideRestrict = false;
                while (nodeCheck && nodeCheck !== this) {
                    if (['TABLE', 'H1', 'H2', 'H3', 'H4', 'BLOCKQUOTE'].includes(nodeCheck.nodeName)) { insideRestrict = true; break; }
                    nodeCheck = nodeCheck.parentNode;
                }
                if (insideRestrict) return;

                const match = textBeforeCursor.match(/\[\*([^\]]+)\]$/);

                if (match) {
                    e.preventDefault();
                    const noteContent = match[1].trim();
                    
                    if (noteContent.length > 0) {
                        const patternLength = match[0].length;
                        const startIdx = offset - patternLength;
                        
                        const textBeforePattern = text.substring(0, startIdx);
                        const textAfterPattern = text.substring(offset);
                        
                        anchorNode.nodeValue = textBeforePattern;
                        
                        const span = document.createElement('span');
                        span.className = 'footnote-ref';
                        span.setAttribute('contenteditable', 'false');
                        span.setAttribute('data-note', noteContent);
                        span.innerText = '[?]';
                        
                        const nextTextNode = document.createTextNode('\u00A0' + textAfterPattern);
                        
                        if (anchorNode.nextSibling) {
                            anchorNode.parentNode.insertBefore(span, anchorNode.nextSibling);
                            anchorNode.parentNode.insertBefore(nextTextNode, span.nextSibling);
                        } else {
                            anchorNode.parentNode.appendChild(span);
                            anchorNode.parentNode.appendChild(nextTextNode);
                        }
                        
                        refreshFootnoteNumbers();
                        
                        const newRange = document.createRange();
                        newRange.setStart(nextTextNode, 1);
                        newRange.collapse(true);
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                        
                        saveCurrentNodeData();
                        return;
                    }
                }

                const trimmed = textBeforeCursor.trim();
                if (textBeforeCursor === trimmed) {
                    if (trimmed === '-') {
                        e.preventDefault();
                        range.setStart(anchorNode, 0);
                        range.setEnd(anchorNode, offset);
                        range.deleteContents();
                        document.execCommand('insertUnorderedList', false, null);
                        saveCurrentNodeData();
                        return;
                    }

                    if (/^\d+\.$/.test(trimmed)) {
                        e.preventDefault();
                        range.setStart(anchorNode, 0);
                        range.setEnd(anchorNode, offset);
                        range.deleteContents();
                        document.execCommand('insertOrderedList', false, null);
                        saveCurrentNodeData();
                        return;
                    }

                    if (/^#{1,4}$/.test(trimmed)) {
                        e.preventDefault();
                        const level = trimmed.length; 
                        range.setStart(anchorNode, 0);
                        range.setEnd(anchorNode, offset);
                        range.deleteContents();
                        
                        const heading = document.createElement('h' + level);
                        heading.innerHTML = "<br>";
                        range.insertNode(heading);
                        
                        const newRange = document.createRange();
                        newRange.setStart(heading, 0);
                        newRange.collapse(true);
                        selection.removeAllRanges();
                        selection.addRange(newRange);
                        saveCurrentNodeData();
                    }
                }
            }
        }
    });

    function generateDynamicTable(rows, cols) {
        const table = document.createElement('table');
        const tbody = document.createElement('tbody');

        for (let r = 0; r < rows; r++) {
            const tr = document.createElement('tr');
            for (let c = 0; c < cols; c++) {
                const cell = document.createElement('td');
                cell.innerHTML = "<br>";
                tr.appendChild(cell);
            }
            tbody.appendChild(tr);
        }
        table.appendChild(tbody);

        const nextDiv = document.createElement('div');
        nextDiv.innerHTML = "<br>";

        hideSlashMenu();
        editorField.focus();
        const selection = window.getSelection();

        if (savedSlashRange) {
            selection.removeAllRanges();
            selection.addRange(savedSlashRange);
            document.execCommand('delete', false, null); 
            
            const currentRange = selection.getRangeAt(0);
            currentRange.insertNode(nextDiv);
            currentRange.insertNode(table);
            
            savedSlashRange = null;
        } else {
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                range.deleteContents();
                range.insertNode(nextDiv);
                range.insertNode(table);
            } else {
                editorField.appendChild(table);
                editorField.appendChild(nextDiv);
            }
        }

        const firstCell = table.querySelector('td');
        if (firstCell) {
            const newRange = document.createRange();
            newRange.setStart(firstCell, 0);
            newRange.collapse(true);
            selection.removeAllRanges();
            selection.addRange(newRange);
        }
        
        saveCurrentNodeData();
    }

    function saveCurrentNodeData() {
        if (!currentDoc || !selectedNodeId) return;
        const node = currentDoc.nodes.find(n => n.id === selectedNodeId);
        if (node) {
            node.title = titleField.innerText;
            node.summary = summaryField.innerText;
            node.content = editorField.innerHTML;
            
            if(selectedNodeId === 'root') {
                currentDoc.title = titleField.innerText;
            }
            currentDoc.updatedAt = Date.now();
            save(); 
            renderDocList();
            renderSidebarTree();
        }
    }

    function toggleMenu() { document.getElementById('side-controls').classList.toggle('open'); }
    function closeMenu() { document.getElementById('side-controls').classList.remove('open'); }
    function handleMenuAction(action) { action(); document.getElementById('side-controls').classList.remove('open'); }

    function createNewDoc() {
        const title = prompt("프로젝트 마인드맵 이름:");
        if (!title) return;
        
        const currentSelectedTheme = document.getElementById('global-theme-switcher').value;
        const defColor = themeColorPaletteMap[currentSelectedTheme][0];
        
        const newDoc = { 
            id: Date.now(), 
            title: title, 
            parentId: null, 
            colorTag: defColor, 
            updatedAt: Date.now(),
            nodes: [{ id: 'root', title: title, summary: '', content: '', x: 5000, y: 5000, parentId: null, level: 0 }] 
        };
        docs.push(newDoc); 
        save(); 
        renderDocList();
        renderSidebarTree();
    }

    function renderDocList() {
        const container = document.getElementById('doc-list');
        if(!container) return;
        container.innerHTML = docs.map(doc => `
            <div class="doc-card" onclick="openDoc(${doc.id})" style="border-top: 8px solid ${doc.colorTag || 'var(--primary)'}">
                <h3 style="margin:0; font-size:18px; color:var(--stroke); font-weight: 800;">${doc.title}</h3>
                <p style="font-size:12px; color:var(--stroke); opacity: 0.7; margin-top:8px; font-weight: 600;">${doc.nodes.length} Thoughts</p>
                <button class="doc-delete-btn" onclick="deleteDoc(event, ${doc.id})">삭제</button>
            </div>
        `).join('');
    }

    function deleteDoc(e, id) { e.stopPropagation(); if(confirm("정말 이 마인드맵 파일을 완전히 삭제하시겠습니까?")) { docs = docs.filter(d => d.id !== id); save(); renderDocList(); renderSidebarTree(); } }

    function openDoc(id) {
        currentDoc = docs.find(d => d.id === id);
        if(!currentDoc) return;
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('mindmap-container').style.display = 'block';
        resetZoom(); 
        renderMindmap();
        renderSidebarTree();
    }

    function renderMindmap() {
        const layer = document.getElementById('nodes-layer');
        const svg = document.getElementById('svg-canvas');
        layer.innerHTML = ''; svg.innerHTML = '';
        currentDoc.nodes.forEach(node => {
            const div = document.createElement('div');
            div.className = `node ${node.id === 'root' ? 'root' : ''}`;
            div.style.left = node.x + 'px'; div.style.top = node.y + 'px';
            
            if(node.id === 'root' && currentDoc.colorTag) {
                div.style.backgroundColor = currentDoc.colorTag;
            }

            div.innerHTML = `<div class="node-info"><b>${node.title || (node.id === 'root' ? '중심' : '주제 없음')}</b><div class="summary">${node.summary || ''}</div></div><button class="add-btn">+</button>`;
            div.querySelector('.node-info').onclick = (e) => { e.stopPropagation(); openDetail(node.id); };
            div.querySelector('.add-btn').onclick = (e) => { e.stopPropagation(); addChildNode(node.id); };
            layer.appendChild(div);
            if (node.parentId) {
                const parent = currentDoc.nodes.find(n => n.id === node.parentId);
                if (parent) {
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const d = `M ${parent.x + 120} ${parent.y + 30} C ${parent.x + 220} ${parent.y + 30}, ${node.x - 100} ${node.y + 30}, ${node.x} ${node.y + 30}`;
                    path.setAttribute("d", d); path.setAttribute("class", "connection"); svg.appendChild(path);
                }
            }
        });
    }

    function addChildNode(parentId) {
        const parent = currentDoc.nodes.find(n => n.id === parentId);
        const nextLevel = (parent.level !== undefined) ? parent.level + 1 : 1;
        let distance = 300; 
        let finalX = parent.x + distance; 
        let finalY = parent.y;
        let foundPlace = false;

        const siblingCount = currentDoc.nodes.filter(n => n.parentId === parentId).length;
        let baseAngle = siblingCount * (Math.PI / 4);

        for (let distMultiplier = 0; distMultiplier < 8; distMultiplier++) {
            let currentDist = distance + (distMultiplier * 100);
            for (let angleStep = 0; angleStep < 32; angleStep++) {
                let testAngle = baseAngle + (angleStep * (Math.PI * 2 / 32));
                let targetX = parent.x + Math.cos(testAngle) * currentDist;
                let targetY = parent.y + Math.sin(testAngle) * currentDist;
                let isOverlap = currentDoc.nodes.some(n => Math.hypot(n.x - targetX, n.y - targetY) < 230);
                if (!isOverlap) { finalX = targetX; finalY = targetY; foundPlace = true; break; }
            }
            if (foundPlace) break;
        }

        if (!foundPlace) {
            finalX = parent.x + 350 + (Math.random() - 0.5) * 200;
            finalY = parent.y + (Math.random() - 0.5) * 500;
        }

        const newNode = { id: 'n' + Date.now(), title: '', summary: '', content: '', x: finalX, y: finalY, parentId: parentId, level: nextLevel };
        currentDoc.nodes.push(newNode); save(); renderMindmap();
    }

    function openPdfModal() { document.getElementById('pdf-scale-modal').style.display = 'flex'; }
    function closePdfModal() { document.getElementById('pdf-scale-modal').style.display = 'none'; }
    function submitPdfModal() {
        const selectedScale = document.querySelector('input[name="pdf-scale-choice"]:checked').value;
        closePdfModal();
        generatePremiumPDF(selectedScale); 
    }

    /* ==================== [완벽 연동: 여백 완전 박멸 및 노드 대형 단독 타이틀 인쇄 엔진] ==================== */
    function generatePremiumPDF(scaleValue) {
        const printArea = document.getElementById('print-area');
        const rootNode = currentDoc.nodes.find(n => n.id === 'root');
        const now = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
        
        const inversePercentage = (100 / parseFloat(scaleValue)).toFixed(2);
        
        // 다운로드 파일명 자동 대입을 위해 시스템 타이틀 임시 변환 단차 확보
        const originalDocTitle = document.title;
        const targetFilename = rootNode.title ? rootNode.title.trim() : 'Ink_Canvas_Report';
        document.title = targetFilename;

        let html = `
            <style>
                @media print {
                    #print-area {
                        transform: scale(${scaleValue});
                        transform-origin: top left;
                        width: ${inversePercentage}% !important;
                        display: block !important;
                    }
                    .pdf-cover, .pdf-body { box-sizing: border-box !important; }
                }
            </style>
            <div class="pdf-cover">
                <div class="canvas-logo">Ink's Canvas Standard Executive Report</div>
                <div class="cover-mid">
                    <h1>${rootNode.title || '무제 리포트 프로젝트'}</h1>
                    <div class="cover-decor"></div>
                    <div class="date">발행일자: ${now}</div>
                </div>
                <div class="cover-bottom"></div>
            </div>
            <div class="pdf-body">
        `;

        const rootSummaryClean = rootNode.summary ? rootNode.summary.trim() : "";
        const rootContentClean = rootNode.content ? rootNode.content.trim() : "";
        
        function buildPdfFootnotesHtml(contentHtml) {
            if(!contentHtml) return '';
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = contentHtml;
            const refs = tempDiv.querySelectorAll('.footnote-ref');
            if(refs.length === 0) return '';
            
            let fHtml = `<div class="bottom-footnotes-area" style="display:block; margin-top:15px; border-top:1px dashed #cbd5e1; padding-top:8px; font-size:13px; color:#64748b;">`;
            fHtml += `<h5 style="margin:0 0 4px 0; font-size:13px; color:#334155;">주석</h5>`;
            refs.forEach((ref, idx) => {
                fHtml += `<div style="margin-bottom:2px;"><span style="font-weight:bold; color:var(--primary);">[${idx+1}]</span> ${ref.getAttribute('data-note') || ''}</div>`;
            });
            fHtml += `</div>`;
            return fHtml;
        }

        // 라벨/배지 완전 삭제: 대형 노드 타이틀 단독 배치 기법 반영
        html += `<div class="pdf-section">
            <div class="pdf-meta-header">
                <h1 class="pdf-node-title-main">${rootNode.title || '총괄 요약 정보'}</h1>
            </div>
            ${rootSummaryClean !== "" ? `<div class="pdf-summary-box">${rootNode.summary}</div>` : ''}
            ${rootContentClean !== "" ? `<div class="pdf-content">${rootNode.content}</div>` : `<p style="color: #94a3b8; font-style: italic;">(작성된 세부 내용이 없습니다.)</p>`}
            ${buildPdfFootnotesHtml(rootNode.content)}
        </div>`;

        function processNodes(parentId, depth) {
            const children = currentDoc.nodes.filter(n => n.parentId === parentId);
            children.forEach((child, index) => {
                html += `<div class="pdf-section ${depth > 1 ? 'level-indent' : ''}">`;
                
                html += `
                    <div class="pdf-meta-header">
                        <h2 class="pdf-node-title-sub">${child.title || '제목 미지정 하위 주제'}</h2>
                    </div>
                `;
                
                const childSummaryClean = child.summary ? child.summary.trim() : "";
                if(childSummaryClean !== "") html += `<div class="pdf-summary-box">${child.summary}</div>`;
                if(child.content) html += `<div class="pdf-content">${child.content}</div>`;
                
                html += buildPdfFootnotesHtml(child.content);
                
                processNodes(child.id, depth + 1);
                html += `</div>`;
            });
        }

        processNodes('root', 1);
        html += `</div>`;
        
        printArea.innerHTML = html;
        
        setTimeout(() => { 
            window.print(); 
            // 출력 프로세스가 마쳐지거나 창이 닫힌 이후 오리지널 페이지 타이틀 복구 복원 인터벌 전개
            setTimeout(() => { document.title = originalDocTitle; }, 1000);
        }, 500);
    }

    function openDetail(nodeId) {
        selectedNodeId = nodeId;
        const node = currentDoc.nodes.find(n => n.id === nodeId);
        document.getElementById('parent-title-display').innerText = node.title || '주제 없음';
        titleField.innerText = node.title || '';
        summaryField.innerText = node.summary || '';
        editorField.innerHTML = node.content || '';
        document.getElementById('detail-view').style.display = 'flex';
        
        refreshFootnoteNumbers();
        lastSavedSelectionRange = null;
    }

    function closeDetail() {
        saveCurrentNodeData(); 
        selectedNodeId = null;
        document.getElementById('detail-view').style.display = 'none'; 
        renderMindmap();
    }

    function deleteNode() {
        if (selectedNodeId === 'root') return alert("중심 노드는 삭제할 수 없습니다.");
        currentDoc.nodes = currentDoc.nodes.filter(n => n.id !== selectedNodeId);
        save(); 
        selectedNodeId = null;
        document.getElementById('detail-view').style.display = 'none'; 
        renderMindmap();
    }

    function execCmd(cmd) { 
        document.execCommand(cmd, false, null); 
        if(cmd === 'undo' || cmd === 'redo') { refreshFootnoteNumbers(); }
        saveCurrentNodeData(); 
    }

    function fitView() {
        if (!currentDoc || !currentDoc.nodes.length) return;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        currentDoc.nodes.forEach(n => { minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x + 200); minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y + 100); });
        const scale = Math.min((window.innerWidth - 100) / (maxX - minX), (window.innerHeight - 100) / (maxY - minY), 1);
        transform.scale = scale;
        transform.x = window.innerWidth / 2 - (minX + (maxX - minX) / 2) * scale;
        transform.y = window.innerHeight / 2 - (minY + (maxY - minY) / 2) * scale;
        updateTransform();
    }

    const container = document.getElementById('mindmap-container');
    const content = document.getElementById('canvas-content');
    
    container.onpointerdown = (e) => {
        if (e.target === container || e.target.id === 'canvas-content' || e.target.tagName === 'svg') {
            isPanning = true;
            startPoint = { x: e.clientX - transform.x, y: e.clientY - transform.y };
            container.setPointerCapture(e.pointerId);
            document.getElementById('side-controls').classList.remove('open');
        }
    };
    container.onpointermove = (e) => { if (isPanning) { transform.x = e.clientX - startPoint.x; transform.y = e.clientY - startPoint.y; updateTransform(); } };
    container.onpointerup = (e) => { isPanning = false; container.releasePointerCapture(e.pointerId); };
    container.onwheel = (e) => {
        if(!currentDoc) return;
        e.preventDefault();
        const f = e.deltaY > 0 ? 0.9 : 1.1;
        const ns = Math.min(Math.max(0.1, transform.scale * f), 3);
        const r = ns / transform.scale;
        transform.x = e.clientX - (e.clientX - transform.x) * r; transform.y = e.clientY - (e.clientY - transform.y) * r;
        transform.scale = ns; updateTransform();
    };
    
    function updateTransform() { content.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`; }
    function resetZoom() { 
        if(!currentDoc) return;
        const root = currentDoc.nodes.find(n => n.id === 'root'); 
        transform.scale = 0.8; 
        transform.x = window.innerWidth / 2 - root.x * transform.scale - 80; transform.y = window.innerHeight / 2 - root.y * transform.scale - 35; 
        updateTransform(); 
    }
    function goHome() { currentDoc = null; document.getElementById('home-screen').style.display = 'flex'; document.getElementById('mindmap-container').style.display = 'none'; renderSidebarTree(); }
    
    function save() { 
        localStorage.setItem('thought_canvas_premium_v5', JSON.stringify(docs)); 
        localStorage.setItem('thought_canvas_folders_v5', JSON.stringify(folders));
    }

    function openSidebar() { document.getElementById('file-sidebar').classList.add('open'); }
    function closeSidebar() { document.getElementById('file-sidebar').classList.remove('open'); }

    function createNewFolder() {
        const name = prompt("생성할 폴더명을 입력하세요:");
        if(!name) return;
        folders.push({ id: 'f_' + Date.now(), title: name });
        save();
        renderSidebarTree();
    }

    function renderSidebarTree() {
        const target = document.getElementById('sidebar-tree-target');
        if (!target) return;
        const sortType = document.getElementById('sidebar-sort-select').value;
        
        let sortedDocs = [...docs];
        if (sortType === 'name') {
            sortedDocs.sort((a,b) => a.title.localeCompare(b.title));
        } else if (sortType === 'date') {
            sortedDocs.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
        }

        let html = '';

        folders.forEach(folder => {
            const folderFiles = sortedDocs.filter(d => d.parentId === folder.id);
            html += `
                <div class="tree-folder" 
                     data-folder-id="${folder.id}" 
                     ondragover="handleFolderDragOver(event, this)" 
                     ondragleave="handleFolderDragLeave(event, this)" 
                     ondrop="handleFolderDrop(event, this)">
                    <div class="folder-title" onclick="toggleFolderSection(this)">
                        <div class="folder-name-container">📁 <span>${folder.title}</span></div>
                        <button class="tree-more-btn" onclick="openContextOptions(event, 'folder', '${folder.id}')">···</button>
                    </div>
                    <div class="folder-content" style="display: block;">
                        ${folderFiles.map(file => getFileItemRowHtml(file)).join('')}
                        ${folderFiles.length === 0 ? '<div style="padding:6px 10px; font-size:11px; color:#a1978a; font-style:italic;">(폴더 비어있음)</div>' : ''}
                    </div>
                </div>
            `;
        });

        const rootFiles = sortedDocs.filter(d => !d.parentId);
        if(rootFiles.length > 0) {
            html += `<div style="margin-top:12px; padding:4px 10px; font-size:11px; color:var(--sidebar-text); border-top:2px dashed var(--sidebar-border); font-weight:bold;">독립 파일 리스트</div>`;
            html += rootFiles.map(file => getFileItemRowHtml(file)).join('');
        }

        if(folders.length === 0 && rootFiles.length === 0) {
            html = `<div style="padding:30px 20px; text-align:center; color:#a1978a; font-size:13px; line-height:1.5;">생성된 파일이나<br>폴더가 없습니다.</div>`;
        }

        target.innerHTML = html;
    }

    function getFileItemRowHtml(file) {
        const isActive = currentDoc && currentDoc.id === file.id ? 'active' : '';
        const tagColor = file.colorTag || 'transparent'; 
        
        return `
            <div class="tree-file ${isActive}" 
                 draggable="true" 
                 ondragstart="handleFileDragStart(event, '${file.id}', this)" 
                 ondragend="handleFileDragEnd(event, this)"
                 onclick="openDoc(${file.id})">
                <div class="file-name-container" title="${file.title}">
                    <span class="file-status-dot" 
                          style="background-color: ${tagColor};" 
                          onclick="cycleFileTagColor(event, '${file.id}')" 
                          title="라벨 색상 즉시 변경"></span>
                    <span>${file.title || '주제 없음'}</span>
                </div>
                <button class="tree-more-btn" onclick="openContextOptions(event, 'file', '${file.id}')">···</button>
            </div>
        `;
    }

    function cycleFileTagColor(e, fileId) {
        if (e && e.stopPropagation) e.stopPropagation(); 
        const doc = docs.find(d => d.id == fileId);
        if(!doc) return;

        const currentSelectedTheme = document.getElementById('global-theme-switcher').value;
        const colors = themeColorPaletteMap[currentSelectedTheme];
            
        let currentIdx = colors.indexOf(doc.colorTag);
        let nextIdx = (currentIdx + 1) % colors.length;
        doc.colorTag = colors[nextIdx];

        save();
        renderDocList();
        renderSidebarTree();
        
        if(currentDoc && currentDoc.id == fileId) { renderMindmap(); }
    }

    function handleFileDragStart(e, fileId, element) {
        draggedFileId = fileId;
        setTimeout(() => element.classList.add('dragging'), 0);
        e.dataTransfer.setData('text/plain', fileId); 
    }

    function handleFileDragEnd(e, element) {
        element.classList.remove('dragging');
        draggedFileId = null;
    }

    function handleFolderDragOver(e, folderElement) {
        e.preventDefault(); 
        folderElement.classList.add('drag-over-folder');
    }

    function handleFolderDragLeave(e, folderElement) { folderElement.classList.remove('drag-over-folder'); }

    function handleFolderDrop(e, folderElement) {
        e.preventDefault();
        e.stopPropagation();
        folderElement.classList.remove('drag-over-folder');
        
        const targetFolderId = folderElement.getAttribute('data-folder-id');
        if (draggedFileId && targetFolderId) {
            const doc = docs.find(d => d.id == draggedFileId);
            if (doc) {
                doc.parentId = targetFolderId; 
                save();
                renderSidebarTree();
                if(currentDoc && currentDoc.id == doc.id) renderMindmap();
            }
        }
    }

    function allowRootFolderDrop(e) { e.preventDefault(); }

    function handleRootFolderDrop(e) {
        if(draggedFileId) {
            e.preventDefault();
            const doc = docs.find(d => d.id == draggedFileId);
            if(doc) {
                doc.parentId = null; 
                save();
                renderSidebarTree();
                if(currentDoc && currentDoc.id == doc.id) renderMindmap();
            }
        }
    }

    function toggleFolderSection(el) {
        const content = el.nextElementSibling;
        if(content) { content.style.display = (content.style.display === 'none') ? 'block' : 'none'; }
    }

    function openContextOptions(e, type, id) {
        if (e && e.stopPropagation) e.stopPropagation();
        selectedContextItem = { type, id };
        
        const menu = document.getElementById('tree-context-panel');
        menu.style.display = 'block';
        menu.style.top = e.clientY + 'px';
        menu.style.left = (e.clientX - 140) + 'px';
    }

    function triggerContextRename() {
        const id = selectedContextItem.id;
        if(selectedContextItem.type === 'folder') {
            const folder = folders.find(f => f.id === id);
            const nextName = prompt("변경할 폴더 이름을 입력하세요:", folder.title);
            if(nextName) folder.title = nextName;
        } else {
            const doc = docs.find(d => d.id == id);
            const nextName = prompt("변경할 마인드맵 이름을 입력하세요:", doc.title);
            if(nextName) {
                doc.title = nextName;
                const rootNode = doc.nodes.find(n => n.id === 'root');
                if(rootNode) rootNode.title = nextName;
                if(currentDoc && currentDoc.id == id) {
                    document.getElementById('parent-title-display').innerText = nextName;
                    renderMindmap();
                }
            }
        }
        save();
        renderDocList();
        renderSidebarTree();
    }

    function triggerContextDelete() {
        const id = selectedContextItem.id;
        if(selectedContextItem.type === 'folder') {
            if(confirm("폴더를 삭제하시겠습니까? (내부 마인드맵 파일은 유지되며 독립 파일로 이전됩니다.)")) {
                docs.forEach(d => { if(d.parentId === id) d.parentId = null; });
                folders = folders.filter(f => f.id !== id);
            }
        } else {
            if(!confirm("이 마인드맵 파일을 완전히 영구 삭제하시겠습니까?")) return;
            docs = docs.filter(d => d.id != id);
            if(currentDoc && currentDoc.id == id) goHome();
        }
        save();
        renderDocList();
        renderSidebarTree();
    }
</script>
</body>
</html>
