<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thought Canvas - Ultimate Executive Report</title>
    <style>
        :root {
            --primary: #4a90e2;
            --bg: #f4f7f9;
            --panel: #ffffff;
            --node-border: #d1d8dd;
        }

        body, html { margin: 0; padding: 0; font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); height: 100%; overflow: hidden; touch-action: none; }
        
        #home-screen { padding: 50px 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow-y: auto; box-sizing: border-box; position: relative; z-index: 2000; background: var(--bg); }
        .doc-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; width: 100%; max-width: 1000px; margin-top: 40px; }
        .doc-card { background: var(--panel); padding: 35px 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; position: relative; border: 1.5px solid transparent; transition: 0.3s; text-align: center; }
        .doc-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .doc-delete-btn { position: absolute; bottom: 12px; right: 12px; font-size: 11px; color: #bbb; background: none; border: none; cursor: pointer; padding: 5px; text-decoration: underline; }

        #mindmap-container { display: none; width: 100vw; height: 100vh; position: relative; background: #eaeff2; overflow: hidden; cursor: grab; }
        #mindmap-container:active { cursor: grabbing; }
        #canvas-content { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
        
        .node { position: absolute; padding: 12px 16px; background: white; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); cursor: pointer; min-width: 150px; border: 1.5px solid var(--node-border); z-index: 2; display: flex; align-items: center; gap: 10px; user-select: none; transition: left 0.3s ease, top 0.3s ease; }
        .node.root { background: var(--primary); color: white; border: none; font-weight: bold; padding: 18px 28px; }
        .node-info { flex: 1; pointer-events: auto; min-width: 80px; }
        .node .summary { font-size: 11px; color: #888; margin-top: 3px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .node.root .summary { color: #d0e6ff; }
        .add-btn { width: 26px; height: 26px; background: #f0f2f5; color: #777; border-radius: 7px; border: none; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        svg { position: absolute; top: 0; left: 0; width: 20000px; height: 20000px; pointer-events: none; }
        .connection { fill: none; stroke: #cbd5e0; stroke-width: 2.5; stroke-linecap: round; }

        #detail-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: white; z-index: 3000; flex-direction: column; }
        .detail-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .detail-body { flex: 1; overflow-y: auto; padding: 40px 10% 180px; }
        
        #detail-title, #detail-summary, #editor { outline: none; width: 100%; }
        #detail-title { font-size: 32px; font-weight: 800; color: #2d3436; margin-bottom: 10px; }
        #detail-summary { background: #f8fafb; border-left: 5px solid var(--primary); padding: 15px; margin-bottom: 30px; border-radius: 8px; font-style: italic; color: #4a5568; }
        
        #editor { min-height: 350px; line-height: 1.8; font-size: 18px; color: #2d3748; }

        /* --- 리스트 순환 마크다운 계층 구조 스타일 --- */
        #editor ul, .pdf-content ul { list-style-type: disc !important; padding-left: 24px; margin: 6px 0; }
        #editor ul ul, .pdf-content ul ul { list-style-type: circle !important; }
        #editor ul ul ul, .pdf-content ul ul ul { list-style-type: square !important; }
        #editor ul ul ul ul, .pdf-content ul ul ul ul { list-style-type: disc !important; }
        #editor ul ul ul ul ul, .pdf-content ul ul ul ul ul { list-style-type: circle !important; }
        #editor ul ul ul ul ul ul, .pdf-content ul ul ul ul ul ul { list-style-type: square !important; }

        #editor ol, .pdf-content ol { list-style-type: decimal !important; padding-left: 24px; margin: 6px 0; }
        #editor ol ol, .pdf-content ol ol { list-style-type: lower-alpha !important; }
        #editor ol ol ol, .pdf-content ol ol ol { list-style-type: lower-roman !important; }
        #editor ol ol ol ol, .pdf-content ol ol ol ol { list-style-type: decimal !important; }
        #editor ol ol ol ol ol, .pdf-content ol ol ol ol ol { list-style-type: lower-alpha !important; }
        #editor ol ol ol ol ol ol, .pdf-content ol ol ol ol ol ol { list-style-type: lower-roman !important; }

        #editor li, .pdf-content li { margin-bottom: 4px; }

        .floating-bar { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); background: #2d3436; padding: 8px 15px; border-radius: 12px; display: flex; gap: 8px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 3100; }
        .floating-bar button { background: transparent; color: #dfe6e9; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }

        .side-controls { position: fixed; bottom: 35px; right: 35px; display: flex; flex-direction: column-reverse; gap: 12px; z-index: 2500; align-items: center; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.12); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        
        .side-controls .menu-item { opacity: 0; transform: translateY(20px) scale(0.6); pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2); }
        .side-controls.open .menu-item { opacity: 1; transform: translateY(0) scale(1); pointer-events: auto; }
        #menu-toggle-btn { z-index: 2501; }
        .side-controls.open #menu-toggle-btn { transform: rotate(45deg); background: #e2e8f0; }

        /* --- 프리미엄 보고서 인쇄 스타일 --- */
        #print-area { display: none; background: white; color: #2d3748; font-family: 'Pretendard', sans-serif; line-height: 1.8; }
        
        .pdf-cover { height: 100vh; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; padding: 80px; box-sizing: border-box; page-break-after: always; position: relative; background: #ffffff; }
        .pdf-cover::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 15px; background: linear-gradient(90deg, var(--primary), #3182ce); }
        .pdf-cover .canvas-logo { font-size: 14px; color: var(--primary); font-weight: 800; letter-spacing: 6px; text-transform: uppercase; border-bottom: 2px solid var(--primary); padding-bottom: 5px; }
        
        .cover-mid { margin-top: auto; margin-bottom: auto; width: 100%; display: flex; flex-direction: column; gap: 25px; }
        .pdf-cover h1 { font-size: 52px; font-weight: 800; margin: 0; color: #1a202c; line-height: 1.25; word-break: keep-all; letter-spacing: -1px; }
        .pdf-cover .cover-decor { width: 120px; height: 6px; background: var(--primary); border-radius: 3px; }
        .pdf-cover .date { font-size: 16px; color: #4a5568; font-weight: 600; letter-spacing: 0.5px; border-left: 3px solid var(--primary); padding-left: 12px; }

        .cover-bottom { font-size: 12px; color: #a0aec0; letter-spacing: 1px; width: 100%; margin-top: auto; }

        .pdf-body { padding: 40px 80px; box-sizing: border-box; }
        .pdf-section { margin-bottom: 35px; page-break-inside: auto; }
        
        .pdf-h1 { font-size: 28px; font-weight: 800; color: #1a202c; border-bottom: 3px solid #1a202c; padding-bottom: 12px; margin-top: 10px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: -0.5px; page-break-after: avoid; }
        .pdf-h2 { font-size: 21px; font-weight: 700; color: #2b6cb0; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin: 35px 0 20px; page-break-after: avoid; }
        .pdf-h3 { font-size: 17px; font-weight: 700; color: #2d3748; margin: 25px 0 12px; display: flex; align-items: center; page-break-after: avoid; }
        .pdf-h3::before { content: ""; width: 6px; height: 6px; background: #4a5568; border-radius: 50%; margin-right: 12px; display: inline-block; }
        
        .level-indent { border-left: 2px solid #edf2f7; padding-left: 24px; margin-left: 8px; margin-top: 15px; margin-bottom: 15px; }
        .pdf-summary-box { background: #f7fafc; border-left: 4px solid var(--primary); padding: 18px 24px; margin: 18px 0; border-radius: 4px; font-style: normal; color: #4a5568; font-size: 14.5px; page-break-inside: avoid; }
        
        .pdf-content { font-size: 15px; color: #2d3748; text-align: justify; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
            .pdf-cover { height: 100vh !important; max-height: 100vh !important; page-break-after: always !important; box-sizing: border-box !important; overflow: hidden !important; }
            .pdf-cover::before { -webkit-print-color-adjust: exact; background: linear-gradient(90deg, var(--primary), #3182ce) !important; }
            .pdf-cover .cover-decor { -webkit-print-color-adjust: exact; background-color: var(--primary) !important; }
            .pdf-summary-box { -webkit-print-color-adjust: exact; background-color: #f7fafc !important; border-left-color: var(--primary) !important; }
            .pdf-h2 { -webkit-print-color-adjust: exact; border-bottom-color: #e2e8f0 !important; }
        }
    </style>
</head>
<body>
    <div id="home-screen">
        <h1 style="font-weight: 800; color: #2d3436; font-size: 38px; margin-bottom: 10px;">Thought Canvas</h1>
        <p style="color:#888; margin-bottom:30px;">당신의 생각을 구조화된 리포트로 변환하세요</p>
        <button onclick="createNewDoc()" style="padding: 15px 30px; border-radius: 35px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);">+ 마인드맵 생성</button>
        <div class="doc-list" id="doc-list"></div>
    </div>

    <div id="mindmap-container">
        <div id="canvas-content">
            <svg id="svg-canvas"></svg>
            <div id="nodes-layer"></div>
        </div>
        <div class="side-controls" id="side-controls">
            <button class="circle-btn" id="menu-toggle-btn" onclick="toggleMenu()" title="메뉴 토글">⚙️</button>
            <button class="circle-btn menu-item" onclick="handleMenuAction(goHome)" title="홈">🏠</button>
            <button class="circle-btn menu-item" onclick="handleMenuAction(resetZoom)" title="중앙 맞춤">🎯</button>
            <button class="circle-btn menu-item" onclick="handleMenuAction(fitView)" title="전체 보기">🔍</button>
            <button class="circle-btn menu-item" onclick="handleMenuAction(generatePremiumPDF)" title="프리미엄 PDF 내보내기">📄</button>
        </div>
    </div>

    <div id="detail-view">
        <div class="detail-header">
            <div id="parent-title-display" style="font-weight:700; color:var(--primary); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:60%;"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="deleteNode()" style="color:#ff7675; background:none; border:none; cursor:pointer; font-weight:bold;">삭제</button>
                <button onclick="closeDetail()" style="padding: 8px 18px; border-radius: 8px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: 700;">완료</button>
            </div>
        </div>
        <div class="detail-body">
            <div id="detail-title" contenteditable="true" placeholder="주제 입력..."></div>
            <div id="detail-summary" contenteditable="true" placeholder="간단한 요약이나 키워드를 입력하세요..."></div>
            <div id="editor" contenteditable="true" placeholder="상세 내용을 자유롭게 작성하세요..."></div>
        </div>
        <div class="floating-bar">
            <button onclick="execCmd('bold')"><b>B</b></button>
            <button onclick="execCmd('italic')"><i>I</i></button>
            <button onclick="execCmd('underline')"><u>U</u></button>
            <div style="width:1px; height:18px; background:#636e72; margin:0 4px;"></div>
            <button onclick="execCmd('insertUnorderedList')">• 목록</button>
            <button onclick="execCmd('insertOrderedList')">1. 숫자</button>
            <div style="width:1px; height:18px; background:#636e72; margin:0 4px;"></div>
            <button onclick="execCmd('outdent')">◀</button>
            <button onclick="execCmd('indent')">▶</button>
        </div>
    </div>
    <div id="print-area"></div>

<script>
    let currentDoc = null;
    let selectedNodeId = null;
    let docs = JSON.parse(localStorage.getItem('thought_canvas_premium_v5') || '[]');
    let transform = { x: 0, y: 0, scale: 1 };
    let isPanning = false, startPoint = { x: 0, y: 0 };

    renderDocList();

    const titleField = document.getElementById('detail-title');
    const summaryField = document.getElementById('detail-summary');
    const editorField = document.getElementById('editor');
    
    titleField.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); 
            summaryField.focus(); 
        }
    });

    // --- [핵심 추가] 입력 즉시 로컬 스토리지 실시간 동기화(Auto-Save) 이벤트 ---
    titleField.addEventListener('input', function() {
        document.getElementById('parent-title-display').innerText = this.innerText || '주제 없음';
        saveCurrentNodeData();
    });
    summaryField.addEventListener('input', saveCurrentNodeData);
    editorField.addEventListener('input', saveCurrentNodeData);

    // 에디터 특수 키 연동 제어
    editorField.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault(); 
            
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                let node = selection.anchorNode;
                let insideList = false;
                
                while (node && node !== this) {
                    if (node.nodeName === 'LI' || node.nodeName === 'UL' || node.nodeName === 'OL') {
                        insideList = true;
                        break;
                    }
                    node = node.parentNode;
                }
                
                if (insideList) {
                    if (e.shiftKey) {
                        document.execCommand('outdent', false, null);
                    } else {
                        document.execCommand('indent', false, null);
                    }
                    saveCurrentNodeData(); // 상태 변경 후 즉시 자동 저장
                }
            }
            return;
        }

        if (e.key === ' ') {
            const selection = window.getSelection();
            if (!selection.rangeCount) return;
            
            const range = selection.getRangeAt(0);
            const anchorNode = selection.anchorNode;
            
            let currentLine = anchorNode;
            while (currentLine && currentLine.parentNode !== this && currentLine.id !== 'editor') {
                currentLine = currentLine.parentNode;
            }
            
            const textContent = currentLine ? currentLine.textContent : anchorNode.textContent;
            
            if (textContent === '-') {
                e.preventDefault(); 
                document.execCommand('delete', false, null); 
                document.execCommand('insertUnorderedList', false, null); 
                saveCurrentNodeData();
            } else if (textContent === '1.') {
                e.preventDefault();
                document.execCommand('delete', false, null);
                document.execCommand('delete', false, null); 
                document.execCommand('insertOrderedList', false, null);
                saveCurrentNodeData();
            }
        }
    });

    // 실시간 현재 노드 데이터 동기화 함수
    function saveCurrentNodeData() {
        if (!currentDoc || !selectedNodeId) return;
        const node = currentDoc.nodes.find(n => n.id === selectedNodeId);
        if (node) {
            node.title = titleField.innerText;
            node.summary = summaryField.innerText;
            node.content = editorField.innerHTML;
            save(); // localStorage 영구 업데이트
        }
    }

    function toggleMenu() { document.getElementById('side-controls').classList.toggle('open'); }
    function closeMenu() { document.getElementById('side-controls').classList.remove('open'); }
    function handleMenuAction(action) { action(); document.getElementById('side-controls').classList.remove('open'); }

    function createNewDoc() {
        const title = prompt("프로젝트 이름:");
        if (!title) return;
        const newDoc = { id: Date.now(), title: title, nodes: [{ id: 'root', title: title, summary: '', content: '', x: 5000, y: 5000, parentId: null, level: 0 }] };
        docs.push(newDoc); save(); renderDocList();
    }

    function renderDocList() {
        const container = document.getElementById('doc-list');
        container.innerHTML = docs.map(doc => `
            <div class="doc-card" onclick="openDoc(${doc.id})">
                <h3 style="margin:0; font-size:18px; color:#111;">${doc.title}</h3>
                <p style="font-size:12px; color:#999; margin-top:8px;">${doc.nodes.length} Thoughts</p>
                <button class="doc-delete-btn" onclick="deleteDoc(event, ${doc.id})">삭제</button>
            </div>
        `).join('');
    }

    function deleteDoc(e, id) { e.stopPropagation(); if(confirm("정말 삭제하시겠습니까?")) { docs = docs.filter(d => d.id !== id); save(); renderDocList(); } }

    function openDoc(id) {
        currentDoc = docs.find(d => d.id === id);
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('mindmap-container').style.display = 'block';
        resetZoom(); renderMindmap();
    }

    function renderMindmap() {
        const layer = document.getElementById('nodes-layer');
        const svg = document.getElementById('svg-canvas');
        layer.innerHTML = ''; svg.innerHTML = '';
        currentDoc.nodes.forEach(node => {
            const div = document.createElement('div');
            div.className = `node ${node.id === 'root' ? 'root' : ''}`;
            div.style.left = node.x + 'px'; div.style.top = node.y + 'px';
            div.innerHTML = `<div class="node-info"><b>${node.title || (node.id === 'root' ? '중심' : '주제 없음')}</b><div class="summary">${node.summary || ''}</div></div><button class="add-btn">+</button>`;
            div.querySelector('.node-info').onclick = (e) => { e.stopPropagation(); openDetail(node.id); };
            div.querySelector('.add-btn').onclick = (e) => { e.stopPropagation(); addChildNode(node.id); };
            layer.appendChild(div);
            if (node.parentId) {
                const parent = currentDoc.nodes.find(n => n.id === node.parentId);
                if (parent) {
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const d = `M ${parent.x + 120} ${parent.y + 30} C ${parent.x + 220} ${parent.y + 30}, ${node.x - 100} ${node.y + 30}, ${node.x} ${node.y + 30}`;
                    path.setAttribute("d", d); path.setAttribute("class", "connection"); svg.appendChild(path);
                }
            }
        });
    }

    function addChildNode(parentId) {
        const parent = currentDoc.nodes.find(n => n.id === parentId);
        const nextLevel = (parent.level !== undefined) ? parent.level + 1 : 1;
        
        let distance = 300; 
        let finalX = parent.x + distance; 
        let finalY = parent.y;
        let foundPlace = false;

        const siblingCount = currentDoc.nodes.filter(n => n.parentId === parentId).length;
        let baseAngle = siblingCount * (Math.PI / 4);

        for (let distMultiplier = 0; distMultiplier < 8; distMultiplier++) {
            let currentDist = distance + (distMultiplier * 100);
            for (let angleStep = 0; angleStep < 32; angleStep++) {
                let testAngle = baseAngle + (angleStep * (Math.PI * 2 / 32));
                let targetX = parent.x + Math.cos(testAngle) * currentDist;
                let targetY = parent.y + Math.sin(testAngle) * currentDist;

                let isOverlap = currentDoc.nodes.some(n => Math.hypot(n.x - targetX, n.y - targetY) < 230);
                if (!isOverlap) {
                    finalX = targetX;
                    finalY = targetY;
                    foundPlace = true;
                    break;
                }
            }
            if (foundPlace) break;
        }

        if (!foundPlace) {
            finalX = parent.x + 350 + (Math.random() - 0.5) * 200;
            finalY = parent.y + (Math.random() - 0.5) * 500;
        }

        const newNode = { id: 'n' + Date.now(), title: '', summary: '', content: '', x: finalX, y: finalY, parentId: parentId, level: nextLevel };
        currentDoc.nodes.push(newNode); save(); renderMindmap();
    }

    function generatePremiumPDF() {
        const printArea = document.getElementById('print-area');
        const rootNode = currentDoc.nodes.find(n => n.id === 'root');
        const now = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
        
        let html = `
            <div class="pdf-cover">
                <div class="canvas-logo">Thought Canvas Standard Executive Report</div>
                <div class="cover-mid">
                    <h1>${rootNode.title || '무제 리포트 프로젝트'}</h1>
                    <div class="cover-decor"></div>
                    <div class="date">발행일자 : ${now}</div>
                </div>
                <div class="cover-bottom"></div>
            </div>
            <div class="pdf-body">
        `;

        const rootSummaryClean = rootNode.summary ? rootNode.summary.trim() : "";
        const rootContentClean = rootNode.content ? rootNode.content.trim() : "";
        
        html += `<div class="pdf-section">
            <div class="pdf-h1">00. Overview</div>
            <div style="font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 15px;">
                중심 주제: ${rootNode.title || '제목 없음'}
            </div>
            ${rootSummaryClean !== "" ? `<div class="pdf-summary-box">${rootNode.summary}</div>` : ''}
            ${rootContentClean !== "" ? `<div class="pdf-content">${rootNode.content}</div>` : `<p style="color: #888; font-style: italic;">(중심 노드의 '요약'이나 '상세 내용'을 입력하시면 이 Overview 섹션에 보고서 총평으로 자동 기록됩니다.)</p>`}
        </div>`;

        function processNodes(parentId, depth) {
            const children = currentDoc.nodes.filter(n => n.parentId === parentId);
            children.forEach((child, index) => {
                let classTag = "";
                if(depth === 1) classTag = "pdf-h2";
                else classTag = "pdf-h3";

                html += `<div class="pdf-section ${depth > 1 ? 'level-indent' : ''}">`;
                const listPrefix = depth === 1 ? `Section 0${index + 1}. ` : '';
                html += `<div class="${classTag}">${listPrefix}${child.title || '제목 없음'}</div>`;
                
                const childSummaryClean = child.summary ? child.summary.trim() : "";
                if(childSummaryClean !== "") {
                    html += `<div class="pdf-summary-box">${child.summary}</div>`;
                }
                
                if(child.content) html += `<div class="pdf-content">${child.content}</div>`;
                
                processNodes(child.id, depth + 1);
                html += `</div>`;
            });
        }

        processNodes('root', 1);
        html += `</div>`;
        
        printArea.innerHTML = html;
        setTimeout(() => { window.print(); }, 500);
    }

    function openDetail(nodeId) {
        selectedNodeId = nodeId;
        const node = currentDoc.nodes.find(n => n.id === nodeId);
        document.getElementById('parent-title-display').innerText = node.title || '주제 없음';
        titleField.innerText = node.title || '';
        summaryField.innerText = node.summary || '';
        editorField.innerHTML = node.content || '';
        document.getElementById('detail-view').style.display = 'flex';
    }

    function closeDetail() {
        saveCurrentNodeData(); // 나가기 전 마지막 확인 저장
        selectedNodeId = null;
        document.getElementById('detail-view').style.display = 'none'; 
        renderMindmap();
    }

    function deleteNode() {
        if (selectedNodeId === 'root') return alert("중심 노드는 삭제할 수 없습니다.");
        currentDoc.nodes = currentDoc.nodes.filter(n => n.id !== selectedNodeId);
        save(); 
        selectedNodeId = null;
        document.getElementById('detail-view').style.display = 'none'; 
        renderMindmap();
    }

    function execCmd(cmd) { 
        document.execCommand(cmd, false, null); 
        saveCurrentNodeData(); // 툴바 스타일 명령 실행 후 즉시 저장 유도
    }

    function fitView() {
        if (!currentDoc.nodes.length) return;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        currentDoc.nodes.forEach(n => { minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x + 200); minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y + 100); });
        const scale = Math.min((window.innerWidth - 100) / (maxX - minX), (window.innerHeight - 100) / (maxY - minY), 1);
        transform.scale = scale;
        transform.x = window.innerWidth / 2 - (minX + (maxX - minX) / 2) * scale;
        transform.y = window.innerHeight / 2 - (minY + (maxY - minY) / 2) * scale;
        updateTransform();
    }

    const container = document.getElementById('mindmap-container');
    const content = document.getElementById('canvas-content');
    
    container.onpointerdown = (e) => {
        if (e.target === container || e.target.id === 'canvas-content' || e.target.tagName === 'svg') {
            isPanning = true;
            startPoint = { x: e.clientX - transform.x, y: e.clientY - transform.y };
            container.setPointerCapture(e.pointerId);
            document.getElementById('side-controls').classList.remove('open');
        }
    };
    
    container.onpointermove = (e) => {
        if (isPanning) {
            transform.x = e.clientX - startPoint.x;
            transform.y = e.clientY - startPoint.y;
            updateTransform();
        }
    };
    
    container.onpointerup = (e) => {
        isPanning = false;
        container.releasePointerCapture(e.pointerId);
    };
    
    container.onwheel = (e) => {
        e.preventDefault();
        const f = e.deltaY > 0 ? 0.9 : 1.1;
        const ns = Math.min(Math.max(0.1, transform.scale * f), 3);
        const r = ns / transform.scale;
        transform.x = e.clientX - (e.clientX - transform.x) * r;
        transform.y = e.clientY - (e.clientY - transform.y) * r;
        transform.scale = ns;
        updateTransform();
    };
    
    function updateTransform() { 
        content.style.transform = `translate(${transform.x}px, ${transform.y}px) scale(${transform.scale})`; 
    }
    
    function resetZoom() { 
        const root = currentDoc.nodes.find(n => n.id === 'root'); 
        transform.scale = 0.8; 
        transform.x = window.innerWidth / 2 - root.x * transform.scale - 80; 
        transform.y = window.innerHeight / 2 - root.y * transform.scale - 35; 
        updateTransform(); 
    }
    
    function goHome() { 
        document.getElementById('home-screen').style.display = 'flex'; 
        document.getElementById('mindmap-container').style.display = 'none'; 
    }
    
    function save() { 
        localStorage.setItem('thought_canvas_premium_v5', JSON.stringify(docs)); 
    }
</script>
</body>
</html>
